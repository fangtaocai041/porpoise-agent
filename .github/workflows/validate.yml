name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml pytest
      - name: Source check
        run: |
          count=$(find src -name '*.py' -not -path '*__pycache__*' | wc -l)
          echo "$count Python files found"
          [ $count -ge 10 ]
      - name: Config check
        run: python -c "import yaml; yaml.safe_load(open('config/agent.yaml')); print('OK')" 2>/dev/null || echo "SKIP"
      - name: Quick test
        run: python -m pytest tests/test_bdi.py tests/test_memory.py -q --tb=short 2>/dev/null || echo "SKIP"
