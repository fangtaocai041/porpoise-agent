# Porpoise Agent 主配置 — 五层标准智能体架构 v2.0
#
# 五层模型:
#   1. interaction  — 交互与感知层
#   2. cognitive    — 认知与决策层
#   3. memory       — 记忆系统层
#   4. mapping      — 逻辑映射与转换层
#   5. execution    — 工具与执行层
#
# 附加: agents (多智能体拓扑)

agent:
  name: "Porpoise Agent"
  version: "0.2.0"
  lab: "FFRC-LiuKai-Lab"
  description: "江豚研究智能体 — 五层闭环反馈系统"
  architecture: "five_layer_cybernetic"

# ── 1. 交互与感知层 ─────────────────────────────────────────

interaction:
  nlu:
    strategy: "keyword_first"           # keyword_first | llm_only | hybrid
    llm_fallback: true
    min_confidence_threshold: 0.3
  renderer:
    default_format: "markdown"          # markdown | json | table | rich
    max_response_length: 10000          # renderer.truncate(output, max_chars=10000)

# ── 2. 认知与决策层 ─────────────────────────────────────────

cognitive:
  bdi:
    enabled: true
    belief_max_tokens: 4000             # 信念上下文最大 token
    auto_persist: true                  # 自动持久化高优先级信念
  react_loop:
    max_steps: 50                       # 单次任务最大步数
    max_tool_calls_per_step: 5
    timeout_seconds: 300
    human_in_loop: true
    approval_required_for:
      - field_survey_plan
      - conservation_recommendation
      - data_deletion
      - external_api_write
  decomposer:
    default_strategy: "cot"             # cot | tot | got
    tot_branch_factor: 3                # ToT 每层候选数
    tot_max_depth: 5
    got_enable_merge: true              # GoT 启用分支合并
  reflexion:
    enabled: true
    max_reflection_history: 10
    retry_limit: 3
    critic_model: "deepseek-reasoner"
  search:
    default_strategy: "beam"            # bfs | dfs | beam | best_first | mcts
    beam_width: 3
    max_nodes: 100
    exploration_weight: 1.414           # MCTS UCB 参数

# ── 3. 记忆系统层 ───────────────────────────────────────────

memory:
  short_term:
    max_tokens: 8000                    # 上下文窗口令牌预算
    compression_threshold: 0.8          # 超过 80% 触发压缩
    decay_rate: 0.0001                  # 遗忘曲线衰减率
  long_term:
    backend: "chromadb"                 # chromadb | neo4j | sqlite
    persist_dir: "./data/chroma_db"
    collections:
      - literature
      - observations
      - notes
      - reports
      - execution_log
    top_k_default: 5
    max_rag_tokens: 2000

# ── 4. 逻辑映射与转换层 ─────────────────────────────────────

mapping:
  router:
    strategy: "intent_table"            # intent_table | llm_dynamic
    fallback_enabled: true
  serializer:
    supported_formats:                  # 支持的序列化格式
      - python
      - sql
      - json
      - http_request
      - function_call
    default_format: "function_call"
  validator:
    safety_checks: true                 # 启用安全检查
    python_danger_checks: true          # 检查危险 Python 操作
    sql_danger_checks: true             # 检查危险 SQL 操作

# ── 5. 工具与执行层 ─────────────────────────────────────────

execution:
  sandbox:
    timeout_seconds: 30.0
    max_output_bytes: 1000000
    max_memory_mb: 512
    allowed_imports:
      - numpy
      - scipy
      - pandas
      - librosa
      - soundfile
      - matplotlib
      - sklearn
      - json
      - csv
      - math
      - statistics
    blocked_modules:
      - os
      - subprocess
      - shutil
      - socket
      - requests
      - ctypes
    allow_network: false
  tools:
    auto_register_builtins: true
    category: "all"                     # all | literature | acoustic | ecology
  api:
    timeout_seconds: 30.0
    sources:
      pubmed:
        enabled: true
        base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
      crossref:
        enabled: true
        base_url: "https://api.crossref.org"
      semantic_scholar:
        enabled: true
        base_url: "https://api.semanticscholar.org/graph/v1"

# ── 多智能体拓扑 ────────────────────────────────────────────

agents:
  literature:
    enabled: true
    model: "deepseek-chat"
    max_papers_per_search: 20
  acoustic:
    enabled: true
    model: "deepseek-chat"
    supported_formats: [".wav", ".flac", ".aiff"]
    default_sampling_rate: 576000
    nbhf_band: [100000, 180000]
  ecology:
    enabled: true
    model: "deepseek-reasoner"
  conservation:
    enabled: true
    model: "deepseek-reasoner"
  critic:
    enabled: true
    model: "deepseek-reasoner"
    auto_review: false                  # 是否自动审查所有输出
    review_triggers:
      - conservation_recommendation
      - field_survey_plan
      - high_error_rate

topology:
  default_type: "dag"                   # sequential | hierarchical | dag | dynamic
  sop_workflow:                         # topology.sequential([literature, acoustic, ecology, conservation])
  debate_enabled: false                 # 启用 Generator ↔ Critic 对抗模式
  debate_rounds: 3
  dynamic_routing: false                # 启用 LLM 动态路由 (实验性)

# ── 技能系统 ────────────────────────────────────────────────

skills:
  auto_discover: true
  skill_dir: "src/skills"
  default_mode: "inline"

# ── 外部集成 ────────────────────────────────────────────────

integration:
  cognitive_search:
    enabled: true                       # 启用 cognitive-search-engine
    path: "D:/Reasonix/cognitive-search-engine"  # 本地路径
    env_var: "COGNITIVE_SEARCH_ENGINE_PATH"     # 环境变量覆盖
    fallback: "builtin"                 # builtin | error
    max_workers: 4                      # 并行搜索线程数
    max_per_query: 10                   # 每 query 最大结果
    providers:                          # 启用的搜索源
      - pubmed
      - crossref
      - openalex

  zotero:
    enabled: true                       # 启用 Zotero 本地库
    db_path: "D:/ZoteroData/zotero.sqlite"
    env_var: "ZOTERO_DB_PATH"
    auto_add: false                     # SQLite read-only; Zotero write API requires running Zotero process

  obsidian:
    enabled: true                       # 启用 Obsidian Vault
    vault_path: "D:/Obsidian Vault"
    env_var: "OBSIDIAN_VAULT_PATH"
    auto_save_notes: true               # IF new_papers_found THEN obsidian.write_literature_note()
    max_auto_save: 3                    # FOR EACH p IN papers[:3]: write_literature_note(p)
    domain_docs:                        # 加载为领域上下文的文档
      - "刘凯研究员课题组研究方向.md"
      - "刘凯老师课题组文献分析.md"
      - "智能体分工协作指南.md"

# ── 知识图谱 (可选) ─────────────────────────────────────────

knowledge_graph:
  enabled: false
  backend: "neo4j"
  uri: "bolt://localhost:7687"